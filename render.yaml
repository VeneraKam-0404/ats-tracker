databases:
  - name: ats-db
    plan: free
    region: frankfurt
    databaseName: ats
    user: ats

services:
  - type: web
    name: ats-tracker
    runtime: docker
    plan: starter
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ats-db
          property: connectionString
      - key: ATS_SECRET_KEY
        generateValue: true
      - key: ATS_UPLOAD_DIR
        value: /data/uploads
      - key: ATS_RELOAD
        value: "false"
    disk:
      name: ats-uploads
      mountPath: /data
      sizeGB: 1
